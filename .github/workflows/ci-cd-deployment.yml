name: CI/CD to deployment

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: aks-self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare Pages artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: echo 'sigius.com' > dist/CNAME

      - name: Install deploy prerequisites
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if command -v rsync >/dev/null 2>&1; then
            exit 0
          fi

          if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          if command -v apt-get >/dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO apt-get install -y rsync
          elif command -v apk >/dev/null 2>&1; then
            $SUDO apk add --no-cache rsync
          else
            echo "No supported package manager found to install rsync" >&2
            exit 1
          fi

      - name: Deploy to deployment branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: deployment
          folder: dist
          clean: true
